<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elixir Data Viewer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      background: #1E1E1E;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 12px 20px;
      background: #252526;
      border-bottom: 1px solid #3C3C3C;
      color: #CCCCCC;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 {
      font-size: 13px;
      font-weight: 400;
      color: #CCCCCC;
    }
    .header .badge {
      background: #0E639C;
      color: #FFFFFF;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
    }
    .header .spacer {
      flex: 1;
    }
    .header .toolbar-btn {
      background: transparent;
      border: 1px solid transparent;
      color: #CCCCCC;
      padding: 4px 8px;
      border-radius: 3px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .header .toolbar-btn:hover {
      background: #3C3C3C;
    }
    .header .toolbar-btn.active {
      background: #0E639C;
      color: #FFFFFF;
    }
    #viewer-container {
      flex: 1;
      overflow: auto;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <h1>Elixir Data Viewer</h1>
      <span class="badge">read-only</span>
      <span class="spacer"></span>
      <button id="btn-word-wrap" class="toolbar-btn" title="Toggle Word Wrap (Alt+Z)">↩ Wrap</button>
    </div>
    <div id="viewer-container"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
